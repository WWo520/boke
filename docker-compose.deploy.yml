name: moke-blog
services:
  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: moke-postgres
    restart: unless-stopped
    env_file: ./deploy/.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [moke-net]

  # ========== Express 后端 ==========
  server:
    build:
      context: ./server
      dockerfile: ../deploy/Dockerfile.server
    container_name: moke-server
    restart: unless-stopped
    env_file: ./deploy/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks: [moke-net]

  # ========== Next.js 前端 ==========
  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    container_name: moke-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://server:3333
    depends_on:
      - server
    networks: [moke-net]

  # ========== Nginx 反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: moke-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - server
    networks: [moke-net]

volumes:
  pg_data:
  uploads_data:

networks:
  moke-net:
    driver: bridge
